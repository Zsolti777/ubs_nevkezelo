<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBS / UBC adatlap</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f3;--surface:#fff;--surface2:#f1efe8;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --text:#1a1a18;--text2:#5f5e5a;
  --accent:#185FA5;--accent-light:#E6F1FB;
  --input-bg:#f1efe8;--section-bg:#185FA5;--section-color:#E6F1FB;
  --danger:#A32D2D;--danger-border:#F09595;--danger-light:#FCEBEB;
  --ok:#1a7f37;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body.dark{
  --bg:#1a1a18;--surface:#26261f;--surface2:#2c2c2a;
  --border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.18);
  --text:#f1efe8;--text2:#b4b2a9;
  --accent:#378ADD;--accent-light:#042C53;
  --input-bg:#2c2c2a;--section-bg:#0C447C;--section-color:#B5D4F4;
  --danger:#F09595;--danger-border:#A32D2D;--danger-light:#2a1010;
  --ok:#3fb950;
}
.wrap{padding:1rem;max-width:520px;margin:0 auto;padding-bottom:6rem;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;padding-top:.5rem;}
.header h1{font-size:18px;font-weight:600;color:var(--text);flex:1;}
.toggle-btn{background:var(--surface2);border:.5px solid var(--border2);border-radius:50px;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.toggle-btn:active{transform:scale(0.96);}
.name-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;margin-bottom:1rem;overflow:hidden;}
.name-title{background:var(--section-bg);color:var(--section-color);font-size:14px;font-weight:600;padding:10px 16px;}
.name-body{padding:12px 16px;}
.name-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.name-select{flex:1;font-size:14px;color:var(--text);background:var(--input-bg);border:.5px solid var(--border2);border-radius:8px;padding:8px 10px;outline:none;}
.name-select:focus{border-color:var(--accent);}
.divider{height:.5px;background:var(--border);margin:12px 0;}
.edit-title{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.add-row{display:flex;gap:8px;margin-bottom:10px;}
.add-input{flex:1;font-size:14px;color:var(--text);background:var(--input-bg);border:.5px solid var(--border2);border-radius:8px;padding:7px 10px;outline:none;}
.add-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(24,95,165,.15);}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:var(--surface);color:var(--text);display:flex;align-items:center;gap:5px;white-space:nowrap;}
.btn-sm:active{transform:scale(0.97);}
.btn-add{background:var(--accent);color:var(--accent-light);border-color:var(--accent);}
.name-list{display:flex;flex-direction:column;gap:6px;}
.name-item{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:var(--input-bg);border-radius:8px;font-size:14px;color:var(--text);}
.btn-del{background:none;border:none;cursor:pointer;color:var(--danger);font-size:18px;padding:0 4px;line-height:1;}
.btn-del:hover{color:#E24B4A;}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.date-row label{font-size:13px;color:var(--text2);}
.date-row input,.date-row select{font-size:13px;background:var(--input-bg);border:.5px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text);outline:none;}
.section-card{background:var(--surface);border:.5px solid var(--border);border-radius:12px;margin-bottom:1rem;overflow:hidden;}
.section-title{background:var(--section-bg);color:var(--section-color);font-size:14px;font-weight:600;padding:10px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.section-title .stitle{flex:1;}
.filled-badge{font-size:11px;font-weight:600;background:rgba(255,255,255,.18);color:var(--section-color);padding:2px 8px;border-radius:20px;}
.filled-badge.done{background:var(--ok);color:#fff;}
.chev{font-size:12px;transition:transform .2s;}
.section-card.collapsed .chev{transform:rotate(-90deg);}
.section-card.collapsed .section-body{display:none;}
.field-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:.5px solid var(--border);}
.field-row:last-child{border-bottom:none;}
.field-label{font-size:14px;color:var(--text2);flex:1;}
.field-input{width:90px;font-size:14px;color:var(--text);background:var(--input-bg);border:.5px solid var(--border2);border-radius:8px;padding:6px 10px;text-align:right;outline:none;flex-shrink:0;}
.field-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(24,95,165,.15);}
.field-input.has-value{border-color:var(--accent);}
.field-unit{width:30px;font-size:12px;color:var(--text2);flex-shrink:0;}
.actionbar-outer{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--surface);border-top:.5px solid var(--border2);}
.actions{display:flex;gap:10px;max-width:520px;margin:0 auto;padding:12px 1rem;}
.btn{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;gap:7px;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:var(--accent-light);border-color:var(--accent);}
.btn-danger{color:var(--danger);border-color:var(--danger-border);}
.btn-danger:active{background:var(--danger-light);}
.footer{text-align:center;font-size:12px;color:var(--text2);padding:1rem 0 1.5rem;border-top:.5px solid var(--border);margin-top:.5rem;}
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--accent-light);padding:10px 24px;border-radius:50px;font-size:14px;font-weight:500;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;z-index:99;}
.toast.show{opacity:1;}
</style>
</head>
<body>
 
<div class="wrap">
  <div class="header">
    <span style="font-size:22px;">📋</span>
    <h1>UBS / UBC adatlap</h1>
    <button class="toggle-btn" onclick="toggleDark()" id="modeBtn">
      <span id="modeIcon">🌙</span>
      <span id="modeLabel">Sötét</span>
    </button>
  </div>
 
  <div class="name-card">
    <div class="name-title">👤 Technikus neve</div>
    <div class="name-body">
      <div class="name-row">
        <select class="name-select" id="nameSelect">
          <option value="">— Válassz nevet —</option>
        </select>
      </div>
      <div class="divider"></div>
      <div class="edit-title">Névlista szerkesztése</div>
      <div class="add-row">
        <input class="add-input" id="newNameInput" type="text" placeholder="Új név beírása..." />
        <button class="btn-sm btn-add" onclick="addName()">+ Hozzáad</button>
      </div>
      <div class="name-list" id="nameList"></div>
    </div>
  </div>
 
  <div class="date-row">
    <label>Dátum:</label>
    <input type="date" id="datum" />
    <label>Műszak:</label>
    <select id="muszak">
      <option>Délelőtt</option>
      <option>Délután</option>
      <option>Éjszaka</option>
    </select>
  </div>
 
  <div id="form-root"></div>
 
  <div class="footer">Fejlesztette: Nagy Zsolt TH-352</div>
</div>
 
<div class="actionbar-outer">
  <div class="actions">
    <button class="btn btn-danger" onclick="torol()">🧹 Törlés</button>
    <button class="btn btn-primary" onclick="mentes()">⬇️ Mentés</button>
  </div>
</div>
 
<div class="toast" id="toast"></div>
 
<script>
// ---- Állomások és mezőik (VÁLTOZATLAN) ----
const sections=[
  {title:"UBS 1",fields:["Anyagnyomás","Hőmérséklet","RAM A mennyisége","RAM B mennyisége","Szűrő előtti nyomás","Szűrő utáni nyomás","RAM A nyomás","RAM B nyomás"]},
  {title:"UBS 2",fields:["Anyagnyomás","Hőmérséklet","RAM A mennyisége","RAM B mennyisége","Szűrő előtti nyomás","Szűrő utáni nyomás","RAM A nyomás","RAM B nyomás"]},
  {title:"UBC",fields:["Anyagnyomás","Hőmérséklet","RAM A mennyisége","RAM B mennyisége","Szűrő előtti nyomás","Szűrő utáni nyomás","RAM A nyomás","RAM B nyomás"]}
];
 
const TAROLO_KULCS='ubsAdatok_v1';
 
// ---- Mértékegység a mező neve alapján ----
function egyseg(mezo){
  const m=mezo.toLowerCase();
  if(m.indexOf('hőmérséklet')!==-1) return '°C';
  if(m.indexOf('mennyiség')!==-1)  return '%';
  if(m.indexOf('nyomás')!==-1)     return 'bar';
  return '';
}
 
// ---- Kártyák felépítése ----
const root=document.getElementById('form-root');
sections.forEach((sec,si)=>{
  const card=document.createElement('div');
  card.className='section-card';
  card.dataset.idx=si;
 
  const t=document.createElement('div');
  t.className='section-title';
  t.innerHTML='<span class="stitle">'+sec.title+'</span>'+
              '<span class="filled-badge">0 / '+sec.fields.length+'</span>'+
              '<span class="chev">▼</span>';
  card.appendChild(t);
 
  const body=document.createElement('div');
  body.className='section-body';
 
  sec.fields.forEach((f,fi)=>{
    const row=document.createElement('div');
    row.className='field-row';
 
    const label=document.createElement('span');
    label.className='field-label';
    label.textContent=f+':';
 
    const input=document.createElement('input');
    input.className='field-input';
    input.type='text';                 // teljes billentyűzet: betű + szám is
    input.placeholder='—';
    input.id='s'+si+'_f'+fi;
    input.addEventListener('input',()=>{onInput(input,si);});
 
    const unit=document.createElement('span');
    unit.className='field-unit';
    unit.textContent=egyseg(f);
 
    row.appendChild(label);
    row.appendChild(input);
    row.appendChild(unit);
    body.appendChild(row);
  });
 
  card.appendChild(body);
  root.appendChild(card);
 
  // lenyitás/összecsukás
  t.addEventListener('click',()=>{card.classList.toggle('collapsed');});
});
 
// ---- Beírásra: kiemelés + badge + auto-mentés ----
function onInput(input,si){
  if(input.value.trim()!=='') input.classList.add('has-value');
  else input.classList.remove('has-value');
  frissitBadge(si);
  mentesTarolo();
}
 
function frissitBadge(si){
  const card=document.querySelector('.section-card[data-idx="'+si+'"]');
  const inputs=card.querySelectorAll('.field-input');
  let tele=0;
  inputs.forEach(x=>{if(x.value.trim()!=='') tele++;});
  const badge=card.querySelector('.filled-badge');
  badge.textContent=tele+' / '+inputs.length;
  if(tele===inputs.length) badge.classList.add('done');
  else badge.classList.remove('done');
}
 
// ---- Dátum: mai nap ----
document.getElementById('datum').value=new Date().toISOString().split('T')[0];
 
// ================= NÉVKEZELÉS (VÁLTOZATLAN kulcs: ubsNames) =================
let names=JSON.parse(localStorage.getItem('ubsNames')||'[]');
if(names.length===0) names=["Kovács János","Nagy Péter","Szabó Gábor"];
 
function saveNames(){localStorage.setItem('ubsNames',JSON.stringify(names));}
 
function renderNames(){
  const sel=document.getElementById('nameSelect');
  const cur=sel.value;
  sel.innerHTML='<option value="">— Válassz nevet —</option>';
  names.forEach(n=>{
    const o=document.createElement('option');
    o.value=n;o.textContent=n;
    if(n===cur)o.selected=true;
    sel.appendChild(o);
  });
  const list=document.getElementById('nameList');
  list.innerHTML='';
  names.forEach((n,i)=>{
    const item=document.createElement('div');
    item.className='name-item';
    item.innerHTML='<span></span><button class="btn-del" onclick="deleteName('+i+')" title="Törlés">✕</button>';
    item.querySelector('span').textContent=n;
    list.appendChild(item);
  });
}
 
function addName(){
  const inp=document.getElementById('newNameInput');
  const val=inp.value.trim();
  if(!val){showToast('Írj be egy nevet!');return;}
  if(names.includes(val)){showToast('Ez a név már szerepel!');return;}
  names.push(val);
  saveNames();
  renderNames();
  document.getElementById('nameSelect').value=val;
  mentesTarolo();
  inp.value='';
  showToast('Név hozzáadva ✓');
}
 
function deleteName(i){
  if(!confirm('"'+names[i]+'" törlése a listáról?')) return;
  const torolt=names[i];
  names.splice(i,1);
  saveNames();
  const sel=document.getElementById('nameSelect');
  if(sel.value===torolt) sel.value='';
  renderNames();
  mentesTarolo();
  showToast('Név törölve');
}
 
document.getElementById('newNameInput').addEventListener('keydown',e=>{
  if(e.key==='Enter') addName();
});
 
// ================= ŰRLAP AUTO-MENTÉS =================
function mentesTarolo(){
  try{
    const adat={
      datum:document.getElementById('datum').value,
      muszak:document.getElementById('muszak').value,
      nev:document.getElementById('nameSelect').value,
      mezok:{}
    };
    sections.forEach((sec,si)=>sec.fields.forEach((_,fi)=>{
      adat.mezok['s'+si+'_f'+fi]=document.getElementById('s'+si+'_f'+fi).value;
    }));
    localStorage.setItem(TAROLO_KULCS,JSON.stringify(adat));
  }catch(e){}
}
 
function visszatoltes(){
  let adat=null;
  try{
    const nyers=localStorage.getItem(TAROLO_KULCS);
    if(nyers) adat=JSON.parse(nyers);
  }catch(e){adat=null;}
 
  if(adat){
    if(adat.datum) document.getElementById('datum').value=adat.datum;
    if(adat.muszak) document.getElementById('muszak').value=adat.muszak;
    if(adat.nev && names.includes(adat.nev)) document.getElementById('nameSelect').value=adat.nev;
    sections.forEach((sec,si)=>sec.fields.forEach((_,fi)=>{
      const k='s'+si+'_f'+fi;
      const el=document.getElementById(k);
      if(adat.mezok && adat.mezok[k]!==undefined){
        el.value=adat.mezok[k];
        if(el.value.trim()!=='') el.classList.add('has-value');
      }
    }));
  }
  sections.forEach((_,si)=>frissitBadge(si));
}
 
document.getElementById('datum').addEventListener('change',mentesTarolo);
document.getElementById('muszak').addEventListener('change',mentesTarolo);
document.getElementById('nameSelect').addEventListener('change',mentesTarolo);
 
// ---- Sötét mód (VÁLTOZATLAN) ----
let dark=false;
function toggleDark(){
  dark=!dark;
  document.body.classList.toggle('dark',dark);
  document.getElementById('modeIcon').textContent=dark?'☀️':'🌙';
  document.getElementById('modeLabel').textContent=dark?'Világos':'Sötét';
  localStorage.setItem('darkMode',dark?'1':'0');
}
if(localStorage.getItem('darkMode')==='1') toggleDark();
 
// ---- Export .txt (egységgel) ----
function mentes(){
  const datum=document.getElementById('datum').value;
  const muszak=document.getElementById('muszak').value;
  const nev=document.getElementById('nameSelect').value||'—';
  let txt='UBS/UBC adatlap\n';
  txt+='Dátum: '+datum+'   Műszak: '+muszak+'   Technikus: '+nev+'\n';
  txt+='═'.repeat(42)+'\n';
  sections.forEach((sec,si)=>{
    txt+='\n'+sec.title+'\n'+'─'.repeat(30)+'\n';
    sec.fields.forEach((f,fi)=>{
      const e=egyseg(f);
      const nyers=document.getElementById('s'+si+'_f'+fi).value.trim();
      const val=nyers===''?'—':nyers+(e?' '+e:'');
      txt+='  '+f+': '+val+'\n';
    });
  });
  txt+='\nFejlesztette: Nagy Zsolt TH-352';
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='adatlap_'+datum+'_'+muszak+'_'+nev+'.txt';
  a.click();URL.revokeObjectURL(url);
  showToast('Mentve! ✓');
}
 
function torol(){
  if(!confirm('Biztosan törlöd az összes beírt értéket?')) return;
  sections.forEach((sec,si)=>sec.fields.forEach((_,fi)=>{
    const el=document.getElementById('s'+si+'_f'+fi);
    el.value='';el.classList.remove('has-value');
  }));
  document.getElementById('nameSelect').value='';
  sections.forEach((_,si)=>frissitBadge(si));
  try{localStorage.removeItem(TAROLO_KULCS);}catch(e){}
  showToast('Mezők törölve');
}
 
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
 
// ---- Indulás ----
renderNames();
visszatoltes();
</script>
</body>
</html>
